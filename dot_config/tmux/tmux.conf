# =============================================
# 1. 基础与性能设置
# =============================================
set -g mouse on
set -as terminal-features ",xterm-256color:RGB"
set -ag update-environment "SSH_TTY"
set-option -g set-clipboard on
setw -g aggressive-resize on

# =============================================
# 2. 光标修复 (恢复终端默认形态，解决消失问题)
# =============================================
# 彻底移除之前的 cnorm 强制指令，让 iTerm2 控制光标
# 建议在 iTerm2 设置中手动调节光标粗细：
# Profiles -> Text -> Cursor -> 选 Vertical Bar 并勾选 Blink
set -g terminal-overrides "xterm*:Ss=\E[%p1%d q:Se=\E[2 q"

# =============================================
# 3. 面板分割线 (大幅调暗，不再刺眼)
# =============================================
set -g pane-border-lines single

# 非活动面板：极暗灰色 (#262626)，几乎不可见，只留一个淡淡的轮廓
set -g pane-border-style fg='#262626',bg=default

# 活动面板：中深灰色 (#444444)，比非活动稍亮一点，保证能分清在哪，但不扎眼
set -g pane-active-border-style fg='#444444',bg=default

# =============================================
# 4. 状态栏 (Status Bar) 极简暗调
# =============================================
set -g status-style bg=default,fg='#666666' # 基础文字调暗
set -g status-interval 2
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 300

# --- 左侧：Session + 用户名 ---
# 使用稍微淡一点的灰色 (#808080)
set -g status-left "#[fg='#808080',bold]  #S #[fg='#333333',none]│ #[fg='#808080'] #(whoami)@#h #[fg='#333333']│ "

# --- 中间：窗口列表 ---
setw -g window-status-separator "  "
setw -g window-status-format "#[fg='#444444']#I:#W"
# 当前活跃窗口：稍微亮一点，带下划线
setw -g window-status-current-format "#[fg='#808080',bold,underline] #I:#W #[fg='#808080',none]•"

# --- 右侧：系统状态 (保持功能，调低图标亮度) ---
set -g status-right "#[fg='#5e8a5e']#{sysstat_cpu} #[fg='#333333']│ #[fg='#8a8a5e']#{sysstat_mem} #[fg='#333333']│ #[fg='#8a5e5e']#{sysstat_swap} #[fg='#333333']│ #[fg='#808080']L:#{sysstat_loadavg} #[fg='#333333']│ #[fg='#666666']%H:%M #[fg='#333333']│ #[fg='#444444']%Y-%m-%d "

# =============================================
# 5. 快捷键与插件
# =============================================
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window

bind-key v split-window -h -c "#{pane_current_path}"
bind-key h split-window -v -c "#{pane_current_path}"

bind R source-file ~/.tmux.conf\; display-message "Config reloaded.."

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'samoshkin/tmux-plugin-sysstat'

# 初始化 (保持在最后)
run '~/.tmux/plugins/tpm/tpm'
