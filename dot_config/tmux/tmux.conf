# =============================================
# 1. 基础与性能设置
# =============================================
set -g mouse on
set -as terminal-features ",xterm-256color:RGB"
set -ag update-environment "SSH_TTY"
set-option -g set-clipboard on
setw -g aggressive-resize on

# =============================================
# 2. 面板分割线 (保持您满意的灰度)
# =============================================
set -g pane-border-lines single

# 非活动面板：中深灰色 (#333333)
set -g pane-border-style fg='#333333',bg=default

# 活动面板：中灰色 (#555555)，具有辨识度且不刺眼
set -g pane-active-border-style fg='#555555',bg=default

# =============================================
# 3. 状态栏 (Status Bar) 极简灰度平衡
# =============================================
set -g status-style bg=default,fg='#666666' 
set -g status-interval 2
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 300

# --- 左侧：Session + 用户名 ---
set -g status-left "#[fg='#808080',bold]  #S #[fg='#444444',none]│ #[fg='#808080'] #(whoami)@#h #[fg='#444444']│ "

# --- 中间：窗口列表 ---
setw -g window-status-separator "  "
setw -g window-status-format "#[fg='#444444']#I:#W"
# 当前活跃窗口：加亮，带下划线标识
setw -g window-status-current-format "#[fg='#999999',bold,underline] #I:#W #[fg='#999999',none]•"

# --- 右侧：系统状态 ---
set -g status-right "#[fg='#5e8a5e']#{sysstat_cpu} #[fg='#444444']│ #[fg='#8a8a5e']#{sysstat_mem} #[fg='#444444']│ #[fg='#8a5e5e']#{sysstat_swap} #[fg='#444444']│ #[fg='#808080']L:#{sysstat_loadavg} #[fg='#444444']│ #[fg='#666666']%H:%M #[fg='#444444']│ #[fg='#444444']%Y-%m-%d "

# =============================================
# 4. 快捷键与插件
# =============================================
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window

bind-key v split-window -h -c "#{pane_current_path}"
bind-key h split-window -v -c "#{pane_current_path}"

# 绑定重载键 Prefix+R
bind R source-file ~/.tmux.conf\; display-message "Config reloaded.."

# TPM 插件列表
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'samoshkin/tmux-plugin-sysstat'

# 初始化插件管理器 (必须在最后)
run '~/.tmux/plugins/tpm/tpm'
